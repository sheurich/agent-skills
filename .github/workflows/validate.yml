---
name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: sheurich/agent-validate@9b57afc32f5bac4013c8cd54e62e1389f58c099a  # v1.1.0
        with:
          skip: claude,gemini
