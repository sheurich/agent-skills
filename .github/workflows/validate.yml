---
name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: sheurich/agent-validate@31f67d979c763ce1a5ff833ae0b3ffecbc6ed1c6  # v1.2.0
        with:
          skip: claude,gemini
